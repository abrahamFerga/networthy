name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Networthy is a thin host + finance module on Plenipo platform packages, restored from the
# committed .packages feed (current version only). The branded frontend is also checked from
# its locked source dependencies so vulnerable build tooling cannot silently return.
jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Networthy.slnx

      - name: Audit .NET dependencies
        run: |
          report="$(dotnet list Networthy.slnx package --vulnerable --include-transitive --format json)"
          echo "$report"
          if echo "$report" | jq -e '[.. | objects | .vulnerabilities? // empty] | any(length > 0)' >/dev/null; then
            echo "Vulnerable .NET packages detected."
            exit 1
          fi

      - name: Build (Release)
        run: dotnet build Networthy.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Networthy.slnx -c Release --no-build --verbosity normal

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.9.0 --activate

      - name: Install frontend dependencies
        working-directory: frontend/networthy-ui
        run: pnpm install --frozen-lockfile

      - name: Audit frontend dependencies
        working-directory: frontend/networthy-ui
        run: pnpm audit --audit-level=moderate

      - name: Test frontend
        working-directory: frontend/networthy-ui
        run: pnpm test

      - name: Build frontend
        working-directory: frontend/networthy-ui
        run: pnpm build
