# Allow native postinstall build scripts only for the deps that genuinely need them
# (esbuild fetches its platform binary; Vite uses it). pnpm blocks all others by default —
# same policy as the Plenipo frontend workspace.
allowBuilds:
  esbuild: true

# pnpm quarantines freshly-published versions (minimumReleaseAge) as supply-chain protection.
# @plenipo/ui is our own first-party platform library, published from abrahamFerga/Plenipo's
# publish.yml with npm provenance attestation, so the quarantine buys us nothing and would block
# same-day platform bumps. Exempt the exact version only — a new pin is required per bump,
# deliberately.
minimumReleaseAgeExclude:
  - '@plenipo/ui@0.1.0-alpha.23'

# Keep transitive test-runner copies on patched builds too. Vitest accepts Vite 6 but pnpm can
# otherwise retain an older compatible Vite 5 snapshot from the previous lockfile.
overrides:
  vite: 6.4.3
  esbuild: 0.25.12
