# Networthy self-hosting — the whole product in one command:
#
#   docker compose up -d          # pulls ghcr.io/abrahamferga/networthy + Postgres
#   open http://localhost:8080    # branded web app; /admin is the admin console
#
# DEFAULT MODE IS "PERSONAL": ASPNETCORE_ENVIRONMENT=Development enables the built-in
# household sign-in (no identity provider) and the keyless Mock AI assistant. That is
# perfect for one household on the machine running Docker and NOT protected by real
# authentication. The default port binding is loopback-only so this mode is not exposed
# to the LAN or internet by accident.
#
# To secure an exposed deployment, point it at any OIDC identity provider and flip to
# Production (auth becomes required; the host refuses to start without it):
#   NETWORTHY_ENVIRONMENT=Production NETWORTHY_BIND_ADDRESS=0.0.0.0 \
#     ALLOWED_HOSTS=finance.example.com AUTH_AUTHORITY=https://<idp> AUTH_AUDIENCE=<aud> \
#     docker compose up -d
#
# To use a commercial AI model, start the stack and configure the tenant's provider/model/key
# under Admin → AI Settings. The key is stored write-only in Plenipo's secret vault.

services:
  db:
    # pgvector-enabled Postgres — the platform's RAG migration needs the vector extension.
    # Networthy's thin wrapper applies OS security updates to the upstream image at release time.
    image: ghcr.io/abrahamferga/networthy-postgres:${NETWORTHY_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-networthy-local-only}
    volumes:
      - networthy-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ghcr.io/abrahamferga/networthy:${NETWORTHY_VERSION:-latest}
    build: .   # `docker compose up --build` builds from this checkout instead of pulling
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Personal mode has no real authentication, so bind only to the local machine by
      # default. An internet/LAN deployment must opt in and use Production + OIDC.
      - "${NETWORTHY_BIND_ADDRESS:-127.0.0.1}:${NETWORTHY_PORT:-8080}:8080"
    volumes:
      # Uploaded statements (Local file provider) survive container replacement.
      - networthy-files:/app/data
    environment:
      ASPNETCORE_ENVIRONMENT: ${NETWORTHY_ENVIRONMENT:-Development}
      # ASP.NET host filtering blocks forged Host headers/DNS rebinding. Set this to the
      # public hostname (semicolon-separated for several) in a secured deployment.
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1}
      ConnectionStrings__plenipo-platform: Host=db;Port=5432;Database=plenipo_platform;Username=postgres;Password=${POSTGRES_PASSWORD:-networthy-local-only}
      ConnectionStrings__plenipo-audit: Host=db;Port=5432;Database=plenipo_audit;Username=postgres;Password=${POSTGRES_PASSWORD:-networthy-local-only}
      # AI provider (default: the dependency-free Mock — no key, works offline).
      Ai__Provider: ${AI_PROVIDER:-Mock}
      Ai__Model: ${AI_MODEL:-gpt-4o-mini}
      # Real-auth mode (Production): any OIDC JWT issuer.
      Auth__Authority: ${AUTH_AUTHORITY:-}
      Auth__Audience: ${AUTH_AUDIENCE:-}
      # File storage: Local (volume below) or AzureBlob (bring a connection string).
      Files__Provider: ${FILES_PROVIDER:-Local}
      Files__AzureBlobConnectionString: ${FILES_AZURE_CONNECTION:-}
      Files__AzureBlobContainer: ${FILES_AZURE_CONTAINER:-plenipo-files}
      # OCR for scanned (image-only) statements: set all three to enable Azure
      # Document Intelligence. Left empty, scanned PDFs report that no OCR engine
      # is configured — digital PDFs/CSV/OFX never need this.
      Ocr__Provider: ${OCR_PROVIDER:-}
      Ocr__Endpoint: ${OCR_ENDPOINT:-}
      Ocr__ApiKey: ${OCR_API_KEY:-}

volumes:
  networthy-data:
  networthy-files:
