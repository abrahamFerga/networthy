<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plenipo Admin</title>
    <!-- Apply the stored theme before the bundle loads so a dark-mode reload never flashes light.
         Keep in sync with src/lib/theme.ts (@plenipo/ui). -->
    <script>
      try {
        var t = localStorage.getItem("plenipo.theme");
        if (t === "dark" || ((t === null || t === "system") && matchMedia("(prefers-color-scheme: dark)").matches))
          document.documentElement.classList.add("dark");
      } catch (e) {}
    </script>
    <script type="module" crossorigin src="/admin/assets/index-a-y2ud7B.js"></script>
    <link rel="stylesheet" crossorigin href="/admin/assets/index-DfCBNRdV.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
